<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Hyrja - Python Academy</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
  <div class="login-box">
    <h2>Hyrja</h2>
    <form id="form-login">

      <div class="input-box">
        <input type="text" id="emri" required>
        <label>Emri i përdoruesit</label>
      </div>

      <div class="input-box">
        <input type="password" id="fjalkalimi" required>
        <label>Fjalëkalimi</label>
      </div>

      <div id="mesazh" style="
        text-align:center;
        font-size:0.85em;
        margin-bottom:10px;
        min-height:20px;
        color:#ff4444;
      "></div>

      <button type="submit" class="btn">Hyr</button>

      <div class="signup-link">
        <a href="registry.html">Regjistrohu</a>
      </div>

    </form>
  </div>

  <span style="--i:0;"></span><span style="--i:1;"></span>
  <span style="--i:2;"></span><span style="--i:3;"></span>
  <span style="--i:4;"></span><span style="--i:5;"></span>
  <span style="--i:6;"></span><span style="--i:7;"></span>
  <span style="--i:8;"></span><span style="--i:9;"></span>
  <span style="--i:10;"></span><span style="--i:11;"></span>
  <span style="--i:12;"></span><span style="--i:13;"></span>
  <span style="--i:14;"></span><span style="--i:15;"></span>
  <span style="--i:16;"></span><span style="--i:17;"></span>
  <span style="--i:18;"></span><span style="--i:19;"></span>
  <span style="--i:20;"></span><span style="--i:21;"></span>
  <span style="--i:22;"></span><span style="--i:23;"></span>
  <span style="--i:24;"></span><span style="--i:25;"></span>
  <span style="--i:26;"></span><span style="--i:27;"></span>
  <span style="--i:28;"></span><span style="--i:29;"></span>
  <span style="--i:30;"></span><span style="--i:31;"></span>
  <span style="--i:32;"></span><span style="--i:33;"></span>
  <span style="--i:34;"></span><span style="--i:35;"></span>
  <span style="--i:36;"></span><span style="--i:37;"></span>
  <span style="--i:38;"></span><span style="--i:39;"></span>
  <span style="--i:40;"></span><span style="--i:41;"></span>
  <span style="--i:42;"></span><span style="--i:43;"></span>
  <span style="--i:44;"></span><span style="--i:45;"></span>
  <span style="--i:46;"></span><span style="--i:47;"></span>
  <span style="--i:48;"></span><span style="--i:49;"></span>
</div>

<style>
#overlay-sukses {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10, 15, 30, 0.92);
  z-index: 999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#overlay-sukses.aktiv {
  display: flex;
  animation: shfaqet 0.4s ease;
}
@keyframes shfaqet {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}
.ikona-sukses {
  font-size: 72px;
  animation: kërcen 0.6s ease;
}
@keyframes kërcen {
  0%   { transform: scale(0); }
  70%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.tekst-sukses {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5em;
  color: #ffd43b;
  margin-top: 20px;
  font-weight: 600;
}
.nën-teksti {
  font-family: 'Poppins', sans-serif;
  font-size: 0.9em;
  color: #94a3b8;
  margin-top: 8px;
}
.shirit-ngarkimit {
  width: 220px;
  height: 4px;
  background: #1e3a5f;
  border-radius: 4px;
  margin-top: 30px;
  overflow: hidden;
}
.shirit-ngarkimit-brendshëm {
  height: 100%;
  width: 0%;
  background: #ffd43b;
  border-radius: 4px;
  animation: ngarko 1.5s ease forwards;
  animation-delay: 0.3s;
}
@keyframes ngarko {
  from { width: 0%; }
  to   { width: 100%; }
}
</style>

<div id="overlay-sukses">
  <div class="ikona-sukses">🐍</div>
  <div class="tekst-sukses" id="overlay-tekst"></div>
  <div class="nën-teksti">Po të ridrejtojmë...</div>
  <div class="shirit-ngarkimit">
    <div class="shirit-ngarkimit-brendshëm"></div>
  </div>
</div>

<script>
function shfaqSukses(teksti, destinacioni) {
  document.getElementById("overlay-tekst").textContent = teksti;
  const ov = document.getElementById("overlay-sukses");
  ov.classList.add("aktiv");
  setTimeout(() => { window.location.href = destinacioni; }, 2000);
}

document.getElementById("form-login").addEventListener("submit", async function(e) {
  e.preventDefault();
  const emri     = document.getElementById("emri").value.trim();
  const fjalk    = document.getElementById("fjalkalimi").value;
  const mesazh   = document.getElementById("mesazh");

  try {
    const res  = await fetch("http://localhost:8000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ emri, fjalkalimi: fjalk })
    });
    const data = await res.json();

    if (data.ok) {
      shfaqSukses("Mirë se vini, " + emri + "!", "home.html");
    } else {
      mesazh.style.color = "#ff4444";
      mesazh.textContent = "❌ " + data.gabim;
    }
  } catch(err) {
    mesazh.style.color = "#ff4444";
    mesazh.textContent = "❌ Serveri nuk u gjet!";
  }
});
</script>

</body>
</html>
